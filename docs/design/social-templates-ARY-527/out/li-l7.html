<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../social.css">
<style>html,body{margin:0}.canvas{width:1200px;height:627px}</style>
</head><body>
<div class="canvas" data-theme="neutral" data-format="liCard" data-block="">
  
  <div class="content" style="padding:72px">
      <div class="tag" style="font-size:22px;padding:11px 20px">Getting organised</div>
      <h1 class="headline" data-fit style="font-size:58px;margin-top:22px">What do we own — and where's the proof?</h1>
      
      <div class="spacer"></div>
      <div class="wordmark" style="gap:15px">
    <span class="mark" style="width:48px;height:48px;border-radius:13px"><svg width="43" height="43" viewBox="0 0 48 48" fill="none">
  <circle cx="24" cy="20" r="6.4" fill="#FBFAF6"/>
  <path d="M20.7 24.5h6.6l1.8 9.2a1.6 1.6 0 0 1-1.57 1.9h-7.04a1.6 1.6 0 0 1-1.57-1.9z" fill="#FBFAF6"/>
</svg></span>
    <span class="words" style="gap:4px">
      <span class="name" style="font-size:34px">Vaulto</span>
      <span class="domain" style="font-size:24px">myvaulto.com</span>
    </span>
  </div></div>
</div>
<script>
(async () => {
  await document.fonts.ready;
  const content = document.querySelector('.content');
  const h = document.querySelector('[data-fit]');
  const MIN = 48;
  let overflow = 0;
  if (h) {
    let fs = parseFloat(getComputedStyle(h).fontSize);
    const fits = () => content.scrollHeight <= content.clientHeight + 1;
    while (!fits() && fs > MIN) { fs -= 2; h.style.fontSize = fs + 'px'; }
    document.documentElement.setAttribute('data-fit-size', String(Math.round(fs)));
    overflow = fits() ? 0 : 1;
  }
  document.documentElement.setAttribute('data-overflow', String(overflow));
})();
</script>
</body></html>
